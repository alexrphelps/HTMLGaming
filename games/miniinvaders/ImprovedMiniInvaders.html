<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Invaders - Improved Version</title>
    <style>
        /* ... existing CSS styles ... */
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            font-family: 'Courier New', monospace;
            color: #00ff88;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #gameCanvas {
            border: 2px solid #00ff88;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
            background: rgba(0, 0, 0, 0.8);
        }

        .game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .ui-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #00ff88;
            font-size: 14px;
            text-shadow: 0 0 5px rgba(0, 255, 136, 0.8);
        }

        .performance-stats {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #00ff88;
            font-size: 12px;
            text-align: right;
            text-shadow: 0 0 5px rgba(0, 255, 136, 0.8);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="ui-overlay">
            <div>Score: <span id="score">0</span></div>
            <div>Lives: <span id="lives">3</span></div>
            <div>Wave: <span id="wave">1</span></div>
            <div>Nukes: <span id="nukes">0</span></div>
        </div>
        <div class="performance-stats">
            <div>FPS: <span id="fps">60</span></div>
            <div>Memory: <span id="memory">0</span> KB</div>
            <div>Performance: <span id="performance">High</span></div>
        </div>
    </div>

    <!-- Include the improved systems -->
    <script src="InputManager.js"></script>
    <script src="GameLoop.js"></script>
    <script src="MemoryManager.js"></script>

    <script>
        /**
         * Improved Mini Invaders Game
         * Integrates advanced input handling, game loop, and memory management
         */

        // Game configuration
        const CONFIG = {
            canvas: {
                width: 800,
                height: 600
            },
            fps: 60,
            player: {
                speed: 5,
                width: 40,
                height: 20
            },
            bullet: {
                speed: 8,
                width: 4,
                height: 10
            },
            alien: {
                width: 30,
                height: 20,
                speed: 1,
                rows: 5,
                cols: 10
            }
        };

        // Game state
        const gameState = {
            player: null,
            bullets: [],
            aliens: [],
            score: 0,
            lives: 3,
            wave: 1,
            gameOver: false,
            paused: false,
            keys: {} // Compatibility with original code
        };

        // Game systems
        let inputManager;
        let gameLoop;
        let memoryManager;
        let canvas;
        let ctx;

        // Performance monitoring
        let performanceUpdateInterval;

        /**
         * Initialize the improved game
         */
        function initGame() {
            console.log('🎮 Initializing improved Mini Invaders game');
            
            // Get canvas and context
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            
            // Initialize game systems
            memoryManager = new MemoryManager();
            inputManager = new InputManager();
            gameLoop = new GameLoop();
            
            // Register canvas with memory manager
            memoryManager.registerCanvasElement(canvas);
            
            // Set up input manager
            inputManager.setGameState(gameState);
            
            // Set up game loop
            gameLoop.setUpdateCallback(updateGame);
            gameLoop.setRenderCallback(renderGame);
            
            // Initialize game objects
            initPlayer();
            initAliens();
            
            // Set up performance monitoring
            setupPerformanceMonitoring();
            
            // Add cleanup callback
            memoryManager.addCleanupCallback(() => {
                gameLoop.destroy();
                inputManager.destroy();
            });
            
            console.log('🎮 Game initialization complete');
        }

        /**
         * Initialize player
         */
        function initPlayer() {
            gameState.player = {
                x: CONFIG.canvas.width / 2 - CONFIG.player.width / 2,
                y: CONFIG.canvas.height - CONFIG.player.height - 10,
                width: CONFIG.player.width,
                height: CONFIG.player.height,
                speed: CONFIG.player.speed,
                
                update() {
                    // Use improved input handling
                    if (inputManager.isKeyPressed('ArrowLeft') || inputManager.isKeyPressed('a') || inputManager.isKeyPressed('A')) {
                        this.x = Math.max(0, this.x - this.speed);
                    }
                    if (inputManager.isKeyPressed('ArrowRight') || inputManager.isKeyPressed('d') || inputManager.isKeyPressed('D')) {
                        this.x = Math.min(CONFIG.canvas.width - this.width, this.x + this.speed);
                    }
                },
                
                shoot() {
                    gameState.bullets.push({
                        x: this.x + this.width / 2 - CONFIG.bullet.width / 2,
                        y: this.y,
                        width: CONFIG.bullet.width,
                        height: CONFIG.bullet.height,
                        speed: CONFIG.bullet.speed,
                        
                        update() {
                            this.y -= this.speed;
                        },
                        
                        render() {
                            ctx.fillStyle = '#00ff88';
                            ctx.fillRect(this.x, this.y, this.width, this.height);
                        }
                    });
                },
                
                render() {
                    ctx.fillStyle = '#00ff88';
                    ctx.fillRect(this.x, this.y, this.width, this.height);
                }
            };
        }

        /**
         * Initialize aliens
         */
        function initAliens() {
            gameState.aliens = [];
            const startX = 50;
            const startY = 50;
            const spacing = 60;
            
            for (let row = 0; row < CONFIG.alien.rows; row++) {
                for (let col = 0; col < CONFIG.alien.cols; col++) {
                    gameState.aliens.push({
                        x: startX + col * spacing,
                        y: startY + row * 40,
                        width: CONFIG.alien.width,
                        height: CONFIG.alien.height,
                        speed: CONFIG.alien.speed,
                        direction: 1,
                        
                        update() {
                            this.x += this.speed * this.direction;
                            
                            // Bounce off edges
                            if (this.x <= 0 || this.x >= CONFIG.canvas.width - this.width) {
                                this.direction *= -1;
                                this.y += 20;
                            }
                        },
                        
                        render() {
                            ctx.fillStyle = '#ff4444';
                            ctx.fillRect(this.x, this.y, this.width, this.height);
                        }
                    });
                }
            }
        }

        /**
         * Update game logic
         */
        function updateGame(deltaTime) {
            if (gameState.gameOver || gameState.paused) return;
            
            // Update player
            if (gameState.player) {
                gameState.player.update();
                
                // Handle shooting with improved input
                if (inputManager.isAnyKeyPressed([' ', 'ArrowUp', 'w', 'W'])) {
                    gameState.player.shoot();
                }
            }
            
            // Update bullets
            gameState.bullets = gameState.bullets.filter(bullet => {
                bullet.update();
                return bullet.y > -bullet.height;
            });
            
            // Update aliens
            gameState.aliens.forEach(alien => alien.update());
            
            // Check collisions
            checkCollisions();
            
            // Check game over conditions
            checkGameOver();
        }

        /**
         * Render the game
         */
        function renderGame() {
            // Clear canvas
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, CONFIG.canvas.width, CONFIG.canvas.height);
            
            // Render game objects
            if (gameState.player) {
                gameState.player.render();
            }
            
            gameState.bullets.forEach(bullet => bullet.render());
            gameState.aliens.forEach(alien => alien.render());
            
            // Render UI
            renderUI();
        }

        /**
         * Check for collisions
         */
        function checkCollisions() {
            // Bullet-alien collisions
            for (let i = gameState.bullets.length - 1; i >= 0; i--) {
                const bullet = gameState.bullets[i];
                
                for (let j = gameState.aliens.length - 1; j >= 0; j--) {
                    const alien = gameState.aliens[j];
                    
                    if (bullet.x < alien.x + alien.width &&
                        bullet.x + bullet.width > alien.x &&
                        bullet.y < alien.y + alien.height &&
                        bullet.y + bullet.height > alien.y) {
                        
                        // Collision detected
                        gameState.bullets.splice(i, 1);
                        gameState.aliens.splice(j, 1);
                        gameState.score += 10;
                        break;
                    }
                }
            }
        }

        /**
         * Check game over conditions
         */
        function checkGameOver() {
            // Check if aliens reached bottom
            const aliensReachedBottom = gameState.aliens.some(alien => 
                alien.y + alien.height >= CONFIG.canvas.height - 50
            );
            
            if (aliensReachedBottom) {
                gameState.lives--;
                if (gameState.lives <= 0) {
                    gameState.gameOver = true;
                    console.log('🎮 Game Over!');
                } else {
                    // Reset aliens
                    initAliens();
                }
            }
            
            // Check if all aliens destroyed
            if (gameState.aliens.length === 0) {
                gameState.wave++;
                initAliens();
                // Increase alien speed
                gameState.aliens.forEach(alien => {
                    alien.speed += 0.2;
                });
            }
        }

        /**
         * Render UI elements
         */
        function renderUI() {
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('lives').textContent = gameState.lives;
            document.getElementById('wave').textContent = gameState.wave;
            
            // Render game over screen
            if (gameState.gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.fillRect(0, 0, CONFIG.canvas.width, CONFIG.canvas.height);
                
                ctx.fillStyle = '#00ff88';
                ctx.font = '48px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', CONFIG.canvas.width / 2, CONFIG.canvas.height / 2);
                
                ctx.font = '24px Courier New';
                ctx.fillText('Press SPACE to restart', CONFIG.canvas.width / 2, CONFIG.canvas.height / 2 + 50);
            }
            
            // Render pause screen
            if (gameState.paused) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.fillRect(0, 0, CONFIG.canvas.width, CONFIG.canvas.height);
                
                ctx.fillStyle = '#00ff88';
                ctx.font = '48px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText('PAUSED', CONFIG.canvas.width / 2, CONFIG.canvas.height / 2);
            }
        }

        /**
         * Setup performance monitoring
         */
        function setupPerformanceMonitoring() {
            performanceUpdateInterval = memoryManager.createManagedInterval(() => {
                const stats = gameLoop.getPerformanceStats();
                const memoryStats = memoryManager.getMemoryStats();
                
                document.getElementById('fps').textContent = stats.currentFPS || 0;
                document.getElementById('memory').textContent = Math.round(memoryStats.totalMemory / 1024);
                document.getElementById('performance').textContent = stats.performanceLevel;
                
                // Monitor memory usage
                memoryManager.monitorMemory();
            }, 1000);
        }

        /**
         * Restart the game
         */
        function restartGame() {
            console.log('🎮 Restarting game');
            
            // Reset game state
            gameState.score = 0;
            gameState.lives = 3;
            gameState.wave = 1;
            gameState.gameOver = false;
            gameState.paused = false;
            gameState.bullets = [];
            
            // Reinitialize game objects
            initPlayer();
            initAliens();
            
            // Reset input state
            inputManager.resetAllKeys();
        }

        /**
         * Start the game
         */
        function startGame() {
            console.log('🎮 Starting improved Mini Invaders');
            initGame();
            gameLoop.start();
        }

        /**
         * Stop the game
         */
        function stopGame() {
            console.log('🎮 Stopping game');
            gameLoop.stop();
            memoryManager.cleanup();
        }

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', () => {
            startGame();
        });

        // Cleanup when page unloads
        window.addEventListener('beforeunload', () => {
            stopGame();
        });

        // Handle visibility change
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                gameState.paused = true;
            } else {
                gameState.paused = false;
                inputManager.resetAllKeys(); // Prevent stuck keys
            }
        });

    </script>
</body>
</html>
