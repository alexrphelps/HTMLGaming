<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Squirrel - Wingsuit Island</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            background: #000;
            width: 100%;
            height: 100%;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        
        #gameContainer {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: linear-gradient(#8ac4f5, #d5eefb 58%, #123b62);
        }

        #game-canvas {
            width: 100%;
            height: 100%;
            display: block;
            outline: none;
        }
        
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 18px;
            z-index: 1000;
        }
        
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            display: none;
            grid-template-columns: repeat(2, minmax(110px, auto));
            gap: 6px 14px;
            color: white;
            font-size: 14px;
            z-index: 100;
            background: rgba(5, 14, 24, 0.64);
            padding: 12px;
            border-radius: 5px;
            backdrop-filter: blur(6px);
        }
        
        #prompt {
            position: absolute;
            bottom: 22px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 13px;
            z-index: 100;
            background: rgba(5, 14, 24, 0.64);
            padding: 10px 14px;
            border-radius: 5px;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="loading">Building island...</div>
        <div id="hud">
            <div>Speed <strong><span id="speed">0</span> km/h</strong></div>
            <div>Altitude <strong><span id="altitude">0</span> m</strong></div>
            <div>Vertical <strong><span id="vertical-speed">0</span> m/s</strong></div>
            <div>Distance <strong><span id="distance">0</span> m</strong></div>
            <div>Mode <strong><span id="mode">Walking</span></strong></div>
        </div>
        <div id="prompt">WASD walk | Space jump | Step off the summit to fly</div>
    </div>

    <!-- Game Modules (loaded in dependency order) -->
    <script src="js/WorldConfig.js"></script>
    <script src="js/Math3D.js"></script>
    <script src="js/TerrainSystem.js"></script>
    <script src="js/EnvironmentSystem.js"></script>
    <script src="js/FlightPhysics.js"></script>
    <script src="js/InputController.js"></script>
    <script src="js/CameraController.js"></script>
    <script src="js/WebGLRenderer.js"></script>
    <script src="js/Game.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
